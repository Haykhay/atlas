version: 2
builds:
  - main: ./cmd/atlas
    binary: atlas
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X github.com/silverstreaminnovations/atlas/internal/cli.Version={{.Version}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
release:
  github:
    owner: silverstreaminnovations
    name: atlas
