version: 2
builds:
  - main: ./cmd/atlas
    binary: atlas
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X github.com/Haykhay/atlas/internal/cli.Version={{.Version}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
release:
  github:
    owner: Haykhay
    name: atlas
dockers_v2:
  - images:
      - ghcr.io/haykhay/atlas
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
homebrew_casks:
  - name: atlas
    repository:
      owner: Haykhay
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Haykhay/atlas
    description: "AI-native infrastructure engineering CLI"
    skip_upload: '{{ if not .Env.TAP_GITHUB_TOKEN }}true{{ end }}'
